<!DOCTYPE html>
<html>
<head>
    <title>Форма</title>
    <style>
        .error { color: red; }
        .success { color: green; font-weight: bold; }
    </style>
</head>
<body>
    <h2>Контактная форма</h2>
    <form id="contactForm">
        <div>
            <label>Имя *</label>
            <input type="text" id="name" required>
            <div id="nameError" class="error" style="display:none;">Заполните имя</div>
        </div>
        <div>
            <label>Email *</label>
            <input type="email" id="email" required>
            <div id="emailError" class="error" style="display:none;">Заполните email</div>
        </div>
        <button type="button" onclick="submitForm()">Отправить</button>
    </form>
    <div id="successMessage" class="success" style="display:none;">Форма отправлена!</div>

    <script>
        function submitForm() {
            let isValid = true;
            document.getElementById('nameError').style.display = 'none';
            document.getElementById('emailError').style.display = 'none';
            
            if (!document.getElementById('name').value) {
                document.getElementById('nameError').style.display = 'block';
                isValid = false;
            }
            if (!document.getElementById('email').value) {
                document.getElementById('emailError').style.display = 'block';
                isValid = false;
            }
            
            if (isValid) {
                document.getElementById('successMessage').style.display = 'block';
                document.getElementById('contactForm').style.display = 'none';
            }
        }
    </script>
</body>
</html>
